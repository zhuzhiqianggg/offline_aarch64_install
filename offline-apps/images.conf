# 业务应用镜像清单 (online 机器执行 pack_app_images.sh 时读取)
#
# 格式说明:
#   - 本文件支持任意 YAML-ish 格式，脚本通过正则自动提取所有
#     `registry/path:tag` 形式的镜像引用 (host 含 . 的才算 registry)
#   - 以 # 开头的行为注释，被忽略
#   - 值为 null / 空值的条目自动跳过
#   - 同一镜像重复出现会自动去重
#   - 也可直接写成一行一个完整镜像地址 (最简格式)
#
# 镜像地址必须保留完整 registry 前缀，离线导入后 K8s 清单无需任何修改。
# 后续追加镜像：直接在本文件按同样格式粘贴即可。

