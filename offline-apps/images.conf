# 业务应用镜像清单 (纯列表格式)
#
# 格式: 一行一个完整镜像引用 (registry/path:tag)
# 注释行以 # 开头
# 空行忽略
#
# 此清单是 pack_apps.sh 拉取镜像的唯一真相源
# 命名空间 (namespace) 仅在 deploy_apps.sh 部署 K8s 资源时使用,
# 与本镜像清单解耦
#
# 用法:
#   scripts/pack_apps.sh               # 拉取并打包
#   FORCE_PULL=1 scripts/pack_apps.sh  # 强制重新拉取
#
# 产出: bundle/${ARCH}/apps/offline-app-images-${PKG_ARCH}-${TS}.tar.gz
# 加载: 离线环境运行包内 scripts/load_apps.sh

