# Elasticsearch 7.17.29 单机测试版
# 生产环境建议使用二进制包集群部署
# 数据目录: /data/elasticsearch/{data,logs}
# 注意: 需要 vm.max_map_count >= 262144
services:
  elasticsearch:
    image: elasticsearch:7.17.29
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - cluster.name=es-cluster
      - node.name=es-node-1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - /data/elasticsearch/data:/usr/share/elasticsearch/data
      - /data/elasticsearch/logs:/usr/share/elasticsearch/logs
      - /data/elasticsearch/config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
