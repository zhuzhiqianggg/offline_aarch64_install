# offline-database 部署与打包配置
# 该文件同时控制：
#   1. package_database_bundle.sh 打包时包含哪些内容
#   2. install_db.sh 默认部署哪些服务
#
# enabled:      true / false
#               false 表示完全禁用，打包和部署时均忽略
# deploy_mode:  docker-compose / binary
#               docker-compose: 使用 Docker 部署，不打包二进制包
#               binary:         使用二进制包直接安装（适用于 Doris/ES/JDK）

[mysql]
enabled=true
deploy_mode=docker-compose

[redis]
enabled=true
deploy_mode=docker-compose

[kafka]
enabled=true
deploy_mode=docker-compose

[nebulagraph]
enabled=true
deploy_mode=docker-compose

[nebulagraph-cluster]
enabled=false
deploy_mode=docker-compose

[elasticsearch]
enabled=true
deploy_mode=binary

[doris]
enabled=true
deploy_mode=binary

[jdk]
enabled=true
deploy_mode=binary
# JDK 是 Doris 和 Elasticsearch 二进制启动的必要依赖
